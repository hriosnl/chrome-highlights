<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Highlights Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="library.css" />
  </head>
  <body>
    <div class="page">
      <header class="top">
        <div class="top-left">
          <img
            src="icons/icon128.png"
            alt=""
            width="50"
            height="50"
            class="logo"
          />
          <div>
            <h1>All Highlights</h1>
            <p id="stats" class="stats">Loading…</p>
          </div>
        </div>
        <div class="top-actions-col">
          <div class="top-actions">
            <input
              id="import-file"
              type="file"
              accept=".json,application/json"
              hidden
            />
            <button id="import-json" class="btn btn-ghost" type="button">
              Import JSON
            </button>
            <button id="export-json" class="btn btn-ghost" type="button">
              Export JSON
            </button>
            <button id="export-md" class="btn btn-ghost" type="button">
              Export Markdown
            </button>
          </div>
          <div class="top-actions top-actions-backup">
            <button id="create-backup" class="btn btn-ghost" type="button">
              Create backup
            </button>
            <button id="view-backups" class="btn btn-ghost" type="button">
              Backups
            </button>
          </div>
        </div>
      </header>

      <div class="search-bar">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
          <path
            d="M18.031 16.6168L22.3137 20.8995L20.8995 22.3137L16.6168 18.031C15.0769 19.263 13.124 20 11 20C6.032 20 2 15.968 2 11C2 6.032 6.032 2 11 2C15.968 2 20 6.032 20 11C20 13.124 19.263 15.0769 18.031 16.6168ZM16.0247 15.8748C17.2475 14.6146 18 12.8956 18 11C18 7.1325 14.8675 4 11 4C7.1325 4 4 7.1325 4 11C4 14.8675 7.1325 18 11 18C12.8956 18 14.6146 17.2475 15.8748 16.0247L16.0247 15.8748Z"
          ></path>
        </svg>
        <input
          id="search"
          type="search"
          placeholder="Search highlights, notes, or URLs…"
          autocomplete="off"
        />
      </div>

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Highlight</th>
              <th>Note</th>
              <th>URL</th>
              <th>Date</th>
              <th class="col-actions"></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <p id="no-results" class="no-results" hidden>
          No highlights match your search.
        </p>
      </div>
    </div>

    <div id="backup-overlay" class="backup-overlay" hidden></div>
    <aside id="backup-panel" class="backup-panel" aria-hidden="true">
      <header class="backup-panel-header">
        <div>
          <h2>Backups</h2>
          <p class="backup-panel-sub">Hourly 08:00–22:00 · past 4 days</p>
        </div>
        <button id="close-backups" class="icon-btn" type="button" title="Close">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
            <path
              d="M12 10.586l4.95-4.95 1.414 1.414-4.95 4.95 4.95 4.95-1.414 1.414-4.95-4.95-4.95 4.95-1.414-1.414 4.95-4.95-4.95-4.95L7.05 5.636z"
            />
          </svg>
        </button>
      </header>
      <ul id="backup-list" class="backup-list"></ul>
      <p id="backup-empty" class="backup-empty" hidden>
        No backups yet. Backups run hourly from 08:00 to 22:00.
      </p>
    </aside>

    <script src="shared/url.js"></script>
    <script src="shared/colors.js"></script>
    <script src="shared/import.js"></script>
    <script src="library.js"></script>
  </body>
</html>
